*{

body{
background:linear-gradient(135deg,#FFEAF6,#FFF8FC,#FFF2F8);

/* ซากุระ */

.sakura{
position:fixed;
top:-10%;
font-size:28px;
animation:fall linear infinite;
pointer-events:none;
opacity:.8;
}

.s1{left:5%;animation-duration:8s;}
.s2{left:20%;animation-duration:10s;}
.s3{left:35%;animation-duration:7s;}
.s4{left:50%;animation-duration:9s;}
.s5{left:65%;animation-duration:11s;}
.s6{left:80%;animation-duration:8s;}
.s7{left:95%;animation-duration:10s;}

@keyframes fall{
0%{transform:translateY(-100px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* หิมะ */

.snow{
position:fixed;
top:-20px;
width:10px;
height:10px;
background:white;
border-radius:50%;
animation:snow linear infinite;
opacity:.9;
pointer-events:none;
}

.n1{left:10%;animation-duration:8s;}
.n2{left:25%;animation-duration:11s;}
.n3{left:40%;animation-duration:9s;}
.n4{left:55%;animation-duration:12s;}
.n5{left:70%;animation-duration:10s;}
.n6{left:85%;animation-duration:9s;}

@keyframes snow{
0%{transform:translateY(-30px);}
100%{transform:translateY(110vh);}
}

/* เมนู */

nav{
background:white;
padding:18px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

nav a{

font-size:18px;
font-weight:600;
color:#666;
transition:.3s;
}

nav a:hover{
color:#ff4f94;
}

/* กล่อง */

.container{
max-width:850px;
margin:60px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.9);
backdrop-filter:blur(10px);
border-radius:35px;
padding:50px;
text-align:center;
box-shadow:0 15px 35px rgba(255,105,180,.18);
}

.card img{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:6px solid #FFD6E8;
margin-bottom:25px;

.card h1{
font-size:45px;
color:#ff4f94;
margin-bottom:10px;
}

.card p{
color:#777;
font-size:18px;
margin-bottom:35px;

.contact{

transition:.3s;

.contact:hover{

}

.contact h2{
color:#ff4f94;
margin-bottom:10px;
}

.contact a{

footer{
