/* ซากุระ */

.sakura{
position:fixed;
top:-10%;
font-size:28px;
animation:fall linear infinite;
pointer-events:none;
opacity:.8;
}

.s1{left:5%;animation-duration:8s;}
.s2{left:20%;animation-duration:10s;}
.s3{left:35%;animation-duration:7s;}
.s4{left:50%;animation-duration:9s;}
.s5{left:65%;animation-duration:11s;}
.s6{left:80%;animation-duration:8s;}
.s7{left:95%;animation-duration:10s;}

@keyframes fall{
0%{transform:translateY(-100px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* เมนู */

nav{
background:white;
padding:18px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

nav a{
text-decoration:none;
color:#666;
margin:0 18px;
font-size:18px;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#ff4f94;
}

/* กล่องข้อมูล */

.container{
max-width:850px;
margin:50px auto;
padding:20px;
}

.card{
background:white;
border-radius:30px;
padding:40px;
text-align:center;
box-shadow:0 12px 25px rgba(255,105,180,.15);
}

.card img{
width:200px;
height:200px;
border-radius:50%;

border:6px solid #FFD6E8;
margin-bottom:20px;
}

.card h1{
color:#ff4f94;
font-size:38px;
}

.card p{

font-size:18px;
}

.contact-box{

.item{

padding:18px;
margin:15px 0;
border-radius:18px;
font-size:18px;
}

.item a{
text-decoration:none;
color:#ff4f94;
font-weight:bold;
}

/* เมนูด้านล่าง */

.menu-grid{
max-width:900px;
margin:50px auto;
display:grid;
grid-template-columns:repeat(3,1fr);

padding:0 20px;

.menu-card{
background:white;
border-radius:20px;
padding:30px;
text-align:center;
text-decoration:none;
color:#ff4f94;
font-size:22px;
font-weight:bold;
box-shadow:0 10px 20px rgba(255,105,180,.15);
transition:.3s;
}

.menu-card:hover{
transform:translateY(-8px);
background:#FFE2EE;
}

.menu-card span{
display:block;
font-size:45px;
margin-bottom:10px;
}

footer{
margin-top:60px;
background:#ff9cc4;
padding:20px;
text-align:center;
color:white;
}

@media(max-width:768px){

.menu-grid{
grid-template-columns:1fr;
}

}
