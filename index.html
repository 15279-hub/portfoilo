/* ซากุระ */

.sakura{
position:fixed;
top:-10%;
font-size:28px;
pointer-events:none;
opacity:.8;
animation:fall linear infinite;
z-index:999;
}

.s1{left:5%;animation-duration:8s;}
.s2{left:18%;animation-duration:10s;}
.s3{left:30%;animation-duration:7s;}
.s4{left:45%;animation-duration:9s;}
.s5{left:60%;animation-duration:11s;}
.s6{left:78%;animation-duration:8s;}
.s7{left:93%;animation-duration:10s;}

@keyframes fall{

0%{
transform:translateY(-100px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}
  /* ❄ Snow Effect */

.snow{
position:fixed;
top:-10%;
background:white;
border-radius:50%;
pointer-events:none;
opacity:.85;
animation:snowFall linear infinite;
box-shadow:0 0 8px rgba(255,255,255,.8);
z-index:998;
}

.n1{left:5%;width:6px;height:6px;animation-duration:8s;animation-delay:0s;}
.n2{left:15%;width:10px;height:10px;animation-duration:12s;animation-delay:2s;}
.n3{left:28%;width:7px;height:7px;animation-duration:9s;animation-delay:1s;}
.n4{left:40%;width:12px;height:12px;animation-duration:13s;animation-delay:3s;}
.n5{left:55%;width:8px;height:8px;animation-duration:10s;animation-delay:1s;}
.n6{left:68%;width:5px;height:5px;animation-duration:8s;animation-delay:2s;}
.n7{left:80%;width:11px;height:11px;animation-duration:11s;animation-delay:0s;}
.n8{left:92%;width:7px;height:7px;animation-duration:9s;animation-delay:2s;}

@keyframes snowFall{

0%{
transform:translateY(-100px) translateX(0);
}

25%{
transform:translateY(25vh) translateX(-15px);
}

50%{
transform:translateY(50vh) translateX(15px);
}

75%{
transform:translateY(75vh) translateX(-10px);
}

100%{
transform:translateY(110vh) translateX(10px);
}

}

/* เมนู */

nav{

position:sticky;

top:0;

background:rgba(255,255,255,.92);

backdrop-filter:blur(10px);

padding:18px;

text-align:center;

box-shadow:0 5px 15px rgba(0,0,0,.08);

z-index:1000;

}

nav a{

text-decoration:none;

margin:0 18px;

color:#666;

font-size:18px;

font-weight:500;

transition:.35s;

}

nav a:hover{

color:#ff4f94;

}

/* หน้าแรก */

.hero{

max-width:1200px;

margin:auto;

min-height:90vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

.hero-card{

background:white;

width:100%;

max-width:1000px;

border-radius:40px;

padding:60px;

display:flex;

align-items:center;

justify-content:space-between;

gap:50px;

box-shadow:0 15px 35px rgba(255,105,180,.18);

transition:.4s;

}

.hero-card:hover{

transform:translateY(-8px);

}

.hero img{

width:300px;

height:300px;

object-fit:cover;

border-radius:50%;

border:8px solid #FFD7E8;

box-shadow:0 10px 25px rgba(255,105,180,.25);

}

.text{

flex:1;

}

.text h3{

font-size:22px;

letter-spacing:5px;

color:#ff8dbb;

margin-bottom:15px;

}

.text h1{

font-size:60px;

color:#ff4f94;

line-height:70px;

margin-bottom:20px;

}
  .text h2{

font-size:26px;

font-weight:400;

color:#ff8dbb;

margin-bottom:35px;

letter-spacing:2px;

}
  

.text p{

font-size:20px;

line-height:36px;

color:#666;

margin-bottom:35px;

}

.button{

display:inline-block;

padding:18px 45px;

background:#ff4f94;

color:white;

text-decoration:none;

border-radius:50px;

font-size:20px;

font-weight:600;

transition:.35s;

}

.button:hover{

background:#ff2b80;

transform:translateY(-5px);

box-shadow:0 10px 20px rgba(255,105,180,.3);

}

@media(max-width:900px){

.hero-card{

flex-direction:column;

text-align:center;

}

.hero img{

width:220px;

height:220px;


}

.text h1{

font-size:42px;

line-height:50px;

}

}
